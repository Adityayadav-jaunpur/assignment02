<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASSIGNMENT 01 PART 02</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <h1>Contact & Feedback Form</h1>

    <form>

        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name"><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email"><br><br>

        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone"><br><br>

        <label for="feedback">Feedback:</label><br>
        <textarea id="feedback" name="feedback" rows="5" cols="30"></textarea><br><br>

        <h3>Rate Our Service</h3>

        <input type="radio" id="excellent" name="rating" value="Excellent">
        <label for="excellent">Excellent</label><br>

        <input type="radio" id="good" name="rating" value="Good">
        <label for="good">Good</label><br>

        <input type="radio" id="average" name="rating" value="Average">
        <label for="average">Average</label><br><br>

        <h3>What did you like?</h3>

        <input type="checkbox" id="design" name="like" value="Design">
        <label for="design">Website Design</label><br>

        <input type="checkbox" id="content" name="like" value="Content">
        <label for="content">Content</label><br>

        <input type="checkbox" id="support" name="like" value="Support">
        <label for="support">Customer Support</label><br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>
    
</body>
</html>
